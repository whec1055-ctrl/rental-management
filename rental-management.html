  ["회전간판","회전간판"],

const normalizeItem = (raw) => {
  const s = String(raw||"").replace(/\s+/g,"").trim(); // 공백 제거 후 비교
  if (!s) return null;
  for (const [k,v] of ITEM_MAP) if (s.includes(k.replace(/\s+/g,""))) return v;
  return null;
};
const normDate = (v) => {
  const s = String(v||"").replace(/\D/g,"");
  if (s.length===8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  return todayStr();
};

/* ── 한국 회사명 정규화 + 퍼지 매칭 ──────────────────────────── */
const normCorpName = (s) =>
  String(s||"")
    .replace(/㈜|\(주\)|\(株\)|（주）|（株）/gi,"")
    .replace(/주식회사|유한회사|합명회사|합자회사|의원|클리닉|법무법인/g,"")
    .replace(/[()（）[\]【】]/g,"")   // 모든 괄호 제거 (支店·지점 표기 등 대응)
    .replace(/\s+/g,"")
    .toLowerCase()                    // 대소문자 무시
    .trim();

const findTenant = (invoiceName, tenants) => {
  const ni = normCorpName(invoiceName);
  if (!ni) return null;
  // 1. 정규화 후 완전일치 (임차인명)
  for (const t of tenants) if (normCorpName(t.name)===ni) return t;
  // 2. 등록된 별칭과 일치 여부
  const rawNi = String(invoiceName||"").trim();
  for (const t of tenants) {
    const aliases = (t.aliases||"").split(",").map(a=>a.trim()).filter(Boolean);
    for (const alias of aliases) {
      if (normCorpName(alias)===ni || alias.trim()===rawNi) return t;
    }
  }
  // 3. 퍼지매칭 (최후 수단)
  let best=null, bestScore=0;
  for (const t of tenants) {
    const nt = normCorpName(t.name);
    if (!nt) continue;
    const longer=Math.max(ni.length,nt.length);
    const shorter=Math.min(ni.length,nt.length);
    if (ni.includes(nt)||nt.includes(ni)) {
      const score=shorter/longer;
      if (score>bestScore){bestScore=score;best=t;}
    }
  }
  return bestScore>=0.80 ? best : null;
};

/* ── 홈택스 전자(세금)계산서 파서 ──────────────────────────────
   헤더 탐지: "작성일자" 셀이 있는 행을 정확히 찾아 메모행과 구별.
   쌍 탐지: /^품목\d*$/ → 숫자 없는 "품목"(전자계산서)도 포함.
────────────────────────────────────────────────────────────── */
const parseInvoiceWb = (wb) => {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:"",blankrows:true});

  // 1. 헤더 행 탐지: "작성일자" 셀이 정확히 있는 행
  let headerIdx=-1, tenantCol=12, dateCol=1;
  const pairs=[];

  for (let i=0;i<Math.min(rows.length,15);i++) {
    const row=rows[i];
    const normH=c=>String(c||"").replace(/\s+/g,""); if (!row.some(c=>normH(c)==="작성일자"||normH(c)==="공급받는자상호")) continue;
    headerIdx=i;
    for (let j=0;j<row.length;j++) {
      const h=String(row[j]||"").replace(/\s+/g,"");
      if (h==="공급받는자상호") tenantCol=j;
      if (h==="작성일자") dateCol=j;
    }
    // 품목/공급가액 쌍 동적 탐지 — 숫자 없는 "품목"(전자계산서)도 허용
    for (let j=0;j<row.length;j++) {
      const h=String(row[j]||"").replace(/\s+/g,"");
      if (/^품목\d*$/.test(h)) {
        for (let k=j+1;k<Math.min(j+8,row.length);k++) {
          const h2=String(row[k]||"").replace(/\s+/g,"");
          if (/^공급가액\d*$/.test(h2)) { pairs.push([j,k]); break; }
        }
      }
    }
    break;
  }

  if (pairs.length===0) pairs.push(...[[23,27],[31,35],[39,43],[47,51]]);
  const dataStart=headerIdx>=0?headerIdx+1:6;

  const results=[];
  for (let i=dataStart;i<rows.length;i++) {
    const row=rows[i];
    const tenantName=String(row[tenantCol]||"").trim();
    if (!tenantName) continue;
    const paidDate=normDate(row[dateCol]);
    for (const [ic,ac] of pairs) {
      const item=normalizeItem(row[ic]);
      const amount=Number(row[ac])||0;
      if (!item||!amount) continue;
      const rawItem=String(row[ic]||"").trim();
      results.push({tenantName,item,amount,paidDate,rawItem});
    }
  }
  return results;
};

/* ── 수납 상태 계산 ───────────────────────────────────────────
   임/관비: 등록금액과 비교 → 수납완료/부분수납/초과수납/미수납
   공과금: 단순 수납완료/미수납
────────────────────────────────────────────────────────────── */
const getPayStatus = (tenant, item, pay) => {
  const amount = Number(pay?.amount)||0;
  if (item==="임대료"||item==="관리비") {
    const expected = item==="임대료" ? Number(tenant.rent)||0 : Number(tenant.managementFee)||0;
    if (!amount||!pay) return {label:"미수납",   color:"#a32d2d",bg:"#fcebeb",diff:null};
    const diff = amount-expected;
    if (diff===0)      return {label:"수납완료", color:"#3b6d11",bg:"#eaf3de",diff:null};
    if (diff<0)        return {label:"부분수납", color:"#854f0b",bg:"#faeeda",diff};
    return              {label:"초과수납", color:"#042c53",bg:"#e6f1fb",diff};
  }
  if (!pay?.paid) return {label:"미수납",   color:"#a32d2d",bg:"#fcebeb",diff:null};
  return               {label:"수납완료", color:"#3b6d11",bg:"#eaf3de",diff:null};
};

function DateInput({value,onChange,style}) {
  const h=(e)=>{ const d=e.target.value.replace(/[^0-9]/g,"").slice(0,8); let f=d; if(d.length>=5)f=d.slice(0,4)+"-"+d.slice(4); if(d.length>=7)f=d.slice(0,4)+"-"+d.slice(4,6)+"-"+d.slice(6); onChange(f); };
  return <input type="text" value={value} onChange={h} placeholder="YYYYMMDD" maxLength={10} style={style}/>;
}
function NumberInput({value,onChange,placeholder,style}) {
  const [foc,setFoc]=useState(false); const raw=useRef(String(value??""));
  return <input type="text" value={foc?raw.current:fmtNum(value)} placeholder={fmtNum(placeholder)||String(placeholder||"")}
    onFocus={()=>{raw.current=String(value??"");setFoc(true);}} onBlur={()=>setFoc(false)}
    onChange={e=>{const c=e.target.value.replace(/,/g,"").replace(/[^0-9]/g,"");raw.current=c;onChange(c);}} style={style}/>;
}

        const prev=await db.get(`tenants:${prevMonth(month)}`);
        if(prev&&prev.length>0){
          setCopyDialog({fromMonth:prevMonth(month),toMonth:month,prevTenants:prev});
          setTenants([]);
        } else {
          setTenants(SEED_TNT); await db.set(`tenants:${month}`,SEED_TNT);
        }
      }

      setLoading(false);

      // 건물 목록 실시간 동기화
      const database = await _fbReady;
      database.ref("rental/buildings").on("value", snap => {
        if(snap.exists()) setBuildings(snap.val());
      });
    };
    init();
  },[]);

  // 달 변경 시: 해당 달 임차인 + 수납 로드 + 실시간 리스너 등록
  useEffect(()=>{
    if(isFirstRender.current){isFirstRender.current=false;return;}
    let payListener=null, tntListener=null;

    const load=async()=>{
      const database = await _fbReady;
      setCopyDialog(null);

      // 수납 실시간 리스너 (다른 사용자 변경 즉시 반영)
      const payRef = database.ref("rental/pay_" + month.replace("-","_"));
      payListener = payRef.on("value", snap => {
        setPayments(snap.exists() ? snap.val() : {});
      });

      // 임차인 로드
      const tm = await db.get(`tenants:${month}`);
      if(tm!==null){
        setTenants(tm);
        // 임차인 실시간 리스너
        const tntRef = database.ref("rental/tenants_" + month.replace("-","_"));
        tntListener = tntRef.on("value", snap => {
          if(snap.exists()) setTenants(snap.val());
        });
      } else {
        const prev=await db.get(`tenants:${prevMonth(month)}`);
        if(prev&&prev.length>0){
          setCopyDialog({fromMonth:prevMonth(month),toMonth:month,prevTenants:prev});
          setTenants([]);
        } else {
          setTenants([]); db.set(`tenants:${month}`,[]);
        }
      }
    };
    load();

    return ()=>{ _fbReady.then(database=>{ if(payListener) database.ref("rental/pay_"+month.replace("-","_")).off("value",payListener); if(tntListener) database.ref("rental/tenants_"+month.replace("-","_")).off("value",tntListener); }); };
  },[month]);

  const saveBuildings = d => { setBuildings(d); db.set("buildings",d); };
  const saveTenants   = d => { setTenants(d);   db.set(`tenants:${month}`,d); };
  const savePayments  = d => { setPayments(d);  db.set(`pay:${month}`,d); };

  // 복사 확인/취소
  const onCopyConfirm = () => {
    saveTenants(copyDialog.prevTenants);
    setCopyDialog(null);
  };
  const onCopyCancel = () => {
    setTenants([]); db.set(`tenants:${month}`,[]);
    setCopyDialog(null);
  };

  const togglePaid = (tid,item) => {
    const t=tenants.find(x=>x.id===tid);
    const cur=payments[tid]?.[item]||{};
    const nowPaid=!cur.paid;
    let amount=cur.amount;
    if(!amount&&nowPaid){ if(item==="임대료")amount=Number(t?.rent)||0; else if(item==="관리비")amount=Number(t?.managementFee)||0; }
    savePayments({...payments,[tid]:{...payments[tid],[item]:{amount:amount||0,paid:nowPaid,paidDate:nowPaid?todayStr():""}}});
  };
  const setAmount=(tid,item,val)=>{ const cur=payments[tid]?.[item]||{paid:false,paidDate:""}; savePayments({...payments,[tid]:{...payments[tid],[item]:{...cur,amount:Number(val)||0,paid:Number(val)>0}}}); };

  /* ── 파일 일괄 수납 ──────────────────────────────────────── */
  const importFiles = async (files, filterBldId=null) => {
    setImpState({status:"loading",log:null,step:"파일 파싱 중..."});
    try {
      const allParsed=[];
      for (const file of Array.from(files)) {
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:"array"});
        allParsed.push(...parseInvoiceWb(wb));
      }
      if(!allParsed.length){ setImpState({status:"error",log:{message:"인식된 수납 항목이 없습니다."}}); return; }

      setImpState({status:"loading",log:null,step:"임차인 매칭 중..."});

      // 건물 필터가 있으면 해당 건물 임차인만 매칭 대상으로 한정
      const targetTenants=filterBldId?tenants.filter(t=>t.buildingId===filterBldId):tenants;

      // 최신 payments 읽기 (stale closure 방지)
      const curPay=await db.get(`pay:${month}`)||{};
      const np={...curPay};
      const matched=[], unmatched=[];

      for (const entry of allParsed) {
        const tenant=findTenant(entry.tenantName,targetTenants);
        if(!tenant){ if(!unmatched.includes(entry.tenantName))unmatched.push(entry.tenantName); continue; }
        np[tenant.id]=np[tenant.id]||{};
        // 임대료·관리비는 실제 청구금액 저장, 공과금도 청구금액 저장
        // 주차비처럼 같은 항목이 여러 행으로 분리된 경우 합산
        const existing=np[tenant.id][entry.item];
        const prevAmt=(existing?.amount)||0;
        np[tenant.id][entry.item]={ amount:prevAmt+entry.amount, paid:true, paidDate:entry.paidDate };
        matched.push(`${tenant.name} - ${entry.item}: ${(prevAmt+entry.amount).toLocaleString("ko-KR")}원`);
      }
      // 인식 안 된 품목 수집 (매핑 없는 품목명)
      const unknownItems=[];
      for (const entry of allParsed) {
        if(entry.item===null&&!unknownItems.find(u=>u.tenant===entry.tenantName&&u.raw===entry.rawItem))
          unknownItems.push({tenant:entry.tenantName,raw:entry.rawItem,amount:entry.amount});
      }

      savePayments(np);
      setImpState({status:"done",log:{files:files.length,matched:matched.length,unmatched,details:matched,unknownItems,filterBldId}});
    } catch(err) {
      console.error(err);
      setImpState({status:"error",log:{message:`오류: ${err.message}`}});
    }
  };

  const downloadTemplate=()=>{
    const ws=XLSX.utils.aoa_to_sheet([["임차인","임대료","관리비",...UTILITY_ITEMS,"수납일"],...tenants.map(t=>[t.name,Number(t.rent)||0,Number(t.managementFee)||0,...UTILITY_ITEMS.map(()=>""),todayStr()])]);
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"수납"); XLSX.writeFile(wb,`수납양식_${month}.xlsx`);
  };
  const getBld=id=>buildings.find(b=>b.id===id)?.name||"-";

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:300,color:"var(--color-text-secondary)"}}>데이터를 불러오는 중...</div>;

  return (
    <div style={{minHeight:"100vh",background:"var(--color-background-tertiary)",fontFamily:"var(--font-sans)"}}>
      <div style={{background:"#1e3a5f",color:"#fff",padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:20}}>🏢</span>
        <div>
          <div style={{fontWeight:500,fontSize:16}}>임대관리 시스템</div>
          <div style={{fontSize:11,opacity:0.7,marginTop:1}}>전자계산서 자동 수납 · 임대료·공과금 관리</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          <span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:online?"rgba(100,220,130,0.2)":"rgba(255,100,100,0.2)",color:online?"#90ffb0":"#ffaaaa",fontWeight:600,border:`1px solid ${online?"rgba(100,220,130,0.4)":"rgba(255,100,100,0.4)"}`}}>{online?"● 실시간 연결":"○ 연결 끊김"}</span>
          <div style={{textAlign:"right",fontSize:12,opacity:0.75}}>
            <div>{new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})}</div>
            <div>{tenants.length}명 임차인 · {buildings.length}개 건물</div>
          </div>
        </div>
      </div>
      <div style={{background:"var(--color-background-primary)",borderBottom:"0.5px solid var(--color-border-tertiary)",display:"flex"}}>
        {[["dashboard","📊 대시보드"],["tenants","👥 임차인 관리"],["rent","💰 임/관비 수납"],["utility","⚡ 공과금 수납"]].map(([k,l])=>(
          <button key={k} onClick={()=>{setTab(k);setFormState(null);}} style={{padding:"10px 18px",fontSize:13,fontWeight:tab===k?500:400,border:"none",borderBottom:tab===k?"2px solid #1e3a5f":"2px solid transparent",background:"transparent",color:tab===k?"#1e3a5f":"var(--color-text-secondary)",cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      <div style={{padding:"16px",maxWidth:1300,margin:"0 auto"}}>
        {tab==="dashboard"&&<DashboardTab buildings={buildings} tenants={tenants} payments={payments} month={month} setMonth={setMonth} getBld={getBld}/>}
        {tab==="tenants"&&<TenantTab buildings={buildings} tenants={tenants} saveBuildings={saveBuildings} saveTenants={saveTenants} getBld={getBld} formState={formState} setFormState={setFormState} month={month} setMonth={setMonth} copyDialog={copyDialog} onCopyConfirm={onCopyConfirm} onCopyCancel={onCopyCancel}/>}
        {(tab==="rent"||tab==="utility")&&<CollectionTab type={tab} tenants={tenants} payments={payments} month={month} setMonth={setMonth} togglePaid={togglePaid} setAmount={setAmount} importFiles={importFiles} impState={impState} setImpState={setImpState} downloadTemplate={downloadTemplate} getBld={getBld} savePayments={savePayments} buildings={buildings}/>}
      </div>
    </div>
  );
}

/* ── 공통 Card ──────────────────────────────────────────────── */
const Card=({children,style})=><div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",...style}}>{children}</div>;
const iS={width:"100%",fontSize:13,padding:"7px 10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",boxSizing:"border-box"};
const lS={display:"block",fontSize:11,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:4};
const r2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:12};

/* ── 임차인 폼 ──────────────────────────────────────────────── */
function TenantForm({buildings,initialData,onSave,onCancel}) {
  const blank=Object.fromEntries(OPTIONAL_ITEMS.map(i=>[i,i==="임대료"||i==="관리비"?true:false]));
  const [form,setForm]=useState({
    buildingId:initialData?.buildingId||buildings[0]?.id||"",
    floor:initialData?.floor||"",name:initialData?.name||"",
    rent:initialData?.rent||"",managementFee:initialData?.managementFee||"",
    contractStart:initialData?.contractStart||"",contractEnd:initialData?.contractEnd||"",
    rentNegotiationDate:initialData?.rentNegotiationDate||"",mgmtNegotiationDate:initialData?.mgmtNegotiationDate||"",
    aliases:initialData?.aliases||"",
    memo:initialData?.memo||"",
    items:initialData?.items?{...blank,...initialData.items}:initialData?.utilities?{...blank,...initialData.utilities}:blank
  });
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const fi=(item)=>setForm(p=>({...p,items:{...p.items,[item]:!p.items[item]}}));
  const save=()=>{ if(!form.buildingId)return alert("건물을 선택해주세요."); if(!form.name.trim())return alert("임차인명을 입력해주세요."); if(!form.floor)return alert("층을 입력해주세요."); onSave(form); };
  const CB=({item})=>(
    <div onClick={()=>fi(item)} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 14px",border:`0.5px solid ${form.items[item]?"#378add":"var(--color-border-tertiary)"}`,borderRadius:"var(--border-radius-md)",cursor:"pointer",background:form.items[item]?"#eef3fb":"var(--color-background-secondary)",fontSize:13,color:form.items[item]?"#0c447c":"var(--color-text-secondary)",userSelect:"none"}}>
      <div style={{width:15,height:15,borderRadius:3,border:`1.5px solid ${form.items[item]?"#378add":"var(--color-border-secondary)"}`,background:form.items[item]?"#378add":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {form.items[item]&&<span style={{color:"#fff",fontSize:10,lineHeight:1}}>✓</span>}
      </div>
      {item}
    </div>
  );
  return (
    <Card style={{marginBottom:14}}>
      <div style={{padding:"12px 18px",borderBottom:"0.5px solid var(--color-border-tertiary)",background:"#f0f4fa",borderRadius:"var(--border-radius-lg) var(--border-radius-lg) 0 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontWeight:500,fontSize:14,color:"#1e3a5f"}}>{initialData?`✏️ 수정 — ${initialData.name}`:"➕ 새 임차인 추가"}</span>
        <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"var(--color-text-secondary)"}}>×</button>
      </div>
      <div style={{padding:"18px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={r2}>
          <div><label style={lS}>건물 *</label>{buildings.length===0?<div style={{fontSize:12,color:"#a32d2d"}}>먼저 건물을 추가하세요.</div>:<select value={form.buildingId} onChange={e=>f("buildingId",e.target.value)} style={iS}>{buildings.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select>}</div>
          <div><label style={lS}>층 *</label><input type="number" value={form.floor} onChange={e=>f("floor",e.target.value)} placeholder="예: 2" style={iS}/></div>
        </div>
        <div><label style={lS}>임차인명 (상호) *</label><input value={form.name} onChange={e=>f("name",e.target.value)} placeholder="임차인명 또는 상호명" style={iS}/></div>
        <div>
          <label style={lS}>계산서 별칭 <span style={{fontWeight:400,color:"var(--color-text-secondary)"}}>— 세금계산서에 다르게 표기된 이름 (여러 개는 콤마로 구분)</span></label>
          <input value={form.aliases} onChange={e=>f("aliases",e.target.value)} placeholder="예: 리엘르의원 광주점, 리엘르" style={iS}/>
          {form.aliases&&<div style={{marginTop:4,display:"flex",flexWrap:"wrap",gap:4}}>
            {form.aliases.split(",").map(a=>a.trim()).filter(Boolean).map((a,i)=>(
              <span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:"#fff3e0",border:"0.5px solid #f0c060",color:"#7a5000"}}>{a}</span>
            ))}
          </div>}
        </div>
        <div>
          <label style={lS}>비고</label>
          <textarea value={form.memo} onChange={e=>f("memo",e.target.value)} placeholder="특이사항, 계약 메모 등 자유롭게 입력" rows={3} style={{...iS,resize:"vertical",lineHeight:1.5}}/>
        </div>
        <div style={r2}>
          <div><label style={lS}>월 임대료 (원)</label><NumberInput value={form.rent} onChange={v=>f("rent",v)} placeholder="500000" style={iS}/></div>
          <div><label style={lS}>월 관리비 (원)</label><NumberInput value={form.managementFee} onChange={v=>f("managementFee",v)} placeholder="50000" style={iS}/></div>
        </div>
        <div style={{background:"#f8f9fb",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
          <div style={{...lS,marginBottom:8}}>납부 대상 선택 항목 <span style={{fontWeight:400}}>— 미선택 시 수납표에서 "해당없음"</span></div>
          <div style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500,marginBottom:6}}>임/관비</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}><CB item="임대료"/><CB item="관리비"/></div>
          <div style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500,marginBottom:6}}>공과금</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{UTILITY_ITEMS.map(i=><CB key={i} item={i}/>)}</div>
        </div>
        <div style={{background:"#f8f9fb",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
          <div style={{...lS,marginBottom:10}}>계약 기간</div>
          <div style={r2}>
            <div><label style={lS}>계약시작일</label><DateInput value={form.contractStart} onChange={v=>f("contractStart",v)} style={iS}/></div>
            <div><label style={lS}>계약종료일</label><DateInput value={form.contractEnd} onChange={v=>f("contractEnd",v)} style={iS}/></div>
          </div>
          <div style={{marginTop:12}}>
            <div><label style={lS}>임/관비 조정 시점</label><DateInput value={form.rentNegotiationDate} onChange={v=>f("rentNegotiationDate",v)} style={iS}/></div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,paddingTop:4}}>
          <button onClick={onCancel} style={{padding:"8px 20px",fontSize:13,border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"transparent",cursor:"pointer",color:"var(--color-text-secondary)"}}>취소</button>
          <button onClick={save} style={{padding:"8px 24px",fontSize:13,background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"var(--border-radius-md)",cursor:"pointer",fontWeight:500}}>저장</button>
        </div>
      </div>
    </Card>
  );
}

/* ── 임차인 탭 ──────────────────────────────────────────────── */
function TenantTab({buildings,tenants,saveBuildings,saveTenants,getBld,formState,setFormState,month,setMonth,copyDialog,onCopyConfirm,onCopyCancel}) {
  const [newBld,setNewBld]=useState(""); const [showBld,setShowBld]=useState(false); const [filterBld,setFilterBld]=useState("");
  const [showCopyFrom,setShowCopyFrom]=useState(false);
  const [copyFromSrc,setCopyFromSrc]=useState("");
  const [copyFromBldId,setCopyFromBldId]=useState(""); // 복사할 원본 건물 ("" = 전체)
  const [confirmDel,setConfirmDel]=useState(null); // tenant id
  const [copyConfirmData,setCopyConfirmData]=useState(null); // {src, count, bldName}
  const addBld=()=>{ if(!newBld.trim())return; saveBuildings([...buildings,{id:uid(),name:newBld.trim()}]); setNewBld(""); setShowBld(false); };
  const delBld=(id)=>{ if(tenants.some(t=>t.buildingId===id)){alert("해당 건물에 임차인이 있습니다.");return;} saveBuildings(buildings.filter(b=>b.id!==id)); };
  const delT=(id)=>{ setConfirmDel(id); };
  const delTConfirm=()=>{ saveTenants(tenants.filter(t=>t.id!==confirmDel)); setConfirmDel(null); };
  const doCopyFrom=async()=>{
    if(!copyFromSrc)return;
    const allSrc=await db.get(`tenants:${copyFromSrc}`);
    if(!allSrc||allSrc.length===0){ setCopyConfirmData({error:`${monthLbl(copyFromSrc)} 임차인 데이터가 없습니다.`}); return; }
    // 건물 필터 적용
    const src=copyFromBldId?allSrc.filter(t=>t.buildingId===copyFromBldId):allSrc;
    if(src.length===0){ setCopyConfirmData({error:`${monthLbl(copyFromSrc)} ${buildings.find(b=>b.id===copyFromBldId)?.name||""} 건물에 임차인 데이터가 없습니다.`}); return; }
    const bldName=copyFromBldId?buildings.find(b=>b.id===copyFromBldId)?.name:"전체 건물";
    setCopyConfirmData({src, count:src.length, fromMonth:copyFromSrc, bldName, bldId:copyFromBldId});
  };
  const doCopyConfirm=()=>{
    if(!copyConfirmData?.src)return;
    if(copyConfirmData.bldId){
      // 건물별 복사: 해당 건물 임차인만 교체, 나머지 건물은 유지
      const otherBldTenants=tenants.filter(t=>t.buildingId!==copyConfirmData.bldId);
      saveTenants([...otherBldTenants,...copyConfirmData.src]);
    } else {
      // 전체 복사: 전체 교체
      saveTenants(copyConfirmData.src);
    }
    setShowCopyFrom(false); setCopyConfirmData(null);
  };
  const sorted=[...(filterBld?tenants.filter(t=>t.buildingId===filterBld):tenants)].sort((a,b)=>{ const bn=getBld(a.buildingId).localeCompare(getBld(b.buildingId)); return bn!==0?bn:(Number(a.floor)||0)-(Number(b.floor)||0); });
  const handleSave=(data)=>{ if(formState?.type==="add")saveTenants([...tenants,{id:uid(),...data}]); else saveTenants(tenants.map(t=>t.id===formState.tenant.id?{...formState.tenant,...data}:t)); setFormState(null); };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* 월 선택 + 복사 다이얼로그 */}
      <Card style={{padding:"14px 18px",background:"#f8fbff"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontWeight:500,fontSize:14,color:"#1e3a5f"}}>📅 임차인 관리 기준 월</span>
          <input type="month" value={month} min="2026-01" onChange={e=>{setMonth(e.target.value);setFilterBld("");setFormState(null);setShowCopyFrom(false);}} style={{fontSize:13,padding:"5px 10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}/>

          </select>
          <button onClick={()=>setFormState({type:"add"})} style={{marginLeft:"auto",padding:"6px 14px",background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"var(--border-radius-md)",fontSize:13,cursor:"pointer",fontWeight:500}}>+ 임차인 추가</button>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"var(--color-background-secondary)"}}>
              {["건물","층","임차인","계산서별칭","임대료","관리비","계약시작","계약종료","조정시점","납부선택항목","비고","관리"].map(h=>(
                <th key={h} style={{padding:"9px 12px",textAlign:"left",whiteSpace:"nowrap",color:"var(--color-text-secondary)",fontWeight:500,borderBottom:"0.5px solid var(--color-border-tertiary)"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {sorted.length===0?<tr><td colSpan={12} style={{textAlign:"center",padding:"40px 0",color:"var(--color-text-secondary)"}}>임차인이 없습니다.</td></tr>
              :sorted.map(t=>{
                const dl=daysUntil(t.contractEnd),rn=daysUntil(t.rentNegotiationDate);
                const warn=d=>d!==null&&d<90;
                const isEd=formState?.type==="edit"&&formState.tenant.id===t.id;
                const sel=t.items||t.utilities||{};
                return <tr key={t.id} style={{borderBottom:"0.5px solid var(--color-border-tertiary)",background:isEd?"#f0f4fa":"transparent"}}>
                  <td style={{padding:"9px 12px",whiteSpace:"nowrap",fontWeight:500,color:"var(--color-text-primary)"}}>{getBld(t.buildingId)}</td>
                  <td style={{padding:"9px 12px",textAlign:"center",color:"var(--color-text-secondary)"}}>{t.floor}층</td>
                  <td style={{padding:"9px 12px",whiteSpace:"nowrap",fontWeight:500,color:"var(--color-text-primary)"}}>{t.name}</td>
                  <td style={{padding:"9px 12px",maxWidth:160}}>
                    {t.aliases?t.aliases.split(",").map(a=>a.trim()).filter(Boolean).map((a,i)=>(
                      <span key={i} style={{display:"inline-block",fontSize:11,padding:"1px 6px",borderRadius:8,background:"#fff3e0",border:"0.5px solid #f0c060",color:"#7a5000",marginRight:3,marginBottom:2,whiteSpace:"nowrap"}}>{a}</span>
                    )):<span style={{fontSize:11,color:"var(--color-text-secondary)"}}>—</span>}
                  </td>
                  <td style={{padding:"9px 12px",textAlign:"right",whiteSpace:"nowrap",color:"#1e3a5f"}}>{fmtNum(t.rent)}원</td>

                  <td style={{padding:"9px 12px",whiteSpace:"nowrap",color:"var(--color-text-secondary)"}}>{t.contractStart||"-"}</td>
                  <td style={{padding:"9px 12px",whiteSpace:"nowrap",color:warn(dl)?"#d85a30":"var(--color-text-secondary)"}}>{t.contractEnd||"-"}{warn(dl)&&<span style={{fontSize:11,marginLeft:4}}>({dl}일)</span>}</td>
                  <td style={{padding:"9px 12px",whiteSpace:"nowrap",color:warn(rn)?"#d85a30":"var(--color-text-secondary)"}}>{t.rentNegotiationDate||"-"}{warn(rn)&&<span style={{fontSize:11,marginLeft:4}}>({rn}일)</span>}</td>

                      {OPTIONAL_ITEMS.filter(i=>sel[i]).map(i=><span key={i} style={{background:UTILITY_ITEMS.includes(i)?"#eef3fb":"#eaf3de",border:`0.5px solid ${UTILITY_ITEMS.includes(i)?"#b5d4f4":"#c0dd97"}`,borderRadius:10,padding:"2px 7px",fontSize:11,color:UTILITY_ITEMS.includes(i)?"#0c447c":"#3b6d11",whiteSpace:"nowrap"}}>{i}</span>)}
                      {!OPTIONAL_ITEMS.some(i=>sel[i])&&<span style={{fontSize:11,color:"var(--color-text-secondary)"}}>없음</span>}
                    </div>
                  </td>

                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </Card>

  );
}

/* ── 수납 탭 ────────────────────────────────────────────────── */
function CollectionTab({type,tenants,payments,month,setMonth,togglePaid,setAmount,importFiles,impState,setImpState,downloadTemplate,getBld,savePayments,buildings}) {
  const fileRef=useRef();
  const isRent=type==="rent";
  const allItems=isRent?["임대료","관리비"]:UTILITY_ITEMS;

  const [showResetConfirm,setShowResetConfirm]=useState(false);
  const [filterBldId,setFilterBldId]=useState(""); // 건물 필터

  // 초기화: 건물 선택 시 해당 건물 임차인 수납만 삭제, 전체면 전체 삭제
  const handleReset=()=>{
    if(showResetConfirm){
      if(filterBldId){
        // 선택 건물 임차인 id 목록
        const bldTenantIds=new Set(tenants.filter(t=>t.buildingId===filterBldId).map(t=>t.id));
        const np=Object.fromEntries(Object.entries(payments).filter(([tid])=>!bldTenantIds.has(tid)));
        savePayments(np);
      } else {
        savePayments({});
      }
      setShowResetConfirm(false);
    } else {
      setShowResetConfirm(true);
    }
  };

  const isApplicable=(tenant,item)=>{
    const sel=tenant.items||tenant.utilities||{};
    const hasPay=!!(payments[tenant.id]?.[item]?.amount);
    if(item==="임대료") return isRent&&(sel["임대료"]!==false);
    if(item==="관리비") return isRent&&(!!sel["관리비"]||hasPay);
    return !isRent&&(!!sel[item]||hasPay);
  };

  const filteredTenants=filterBldId?tenants.filter(t=>t.buildingId===filterBldId):tenants;
  const sorted=[...filteredTenants].sort((a,b)=>{ const bn=getBld(a.buildingId).localeCompare(getBld(b.buildingId)); return bn!==0?bn:(Number(a.floor)||0)-(Number(b.floor)||0); });

  // 통계
  let totalExpected=0,collectedAmt=0,totalCnt=0,completedCnt=0,partialCnt=0,unpaidCnt=0;
  for(const t of sorted) for(const item of allItems) {
    if(!isApplicable(t,item)) continue; totalCnt++;
    const pay=payments[t.id]?.[item];
    const st=getPayStatus(t,item,pay);
    const amt=Number(pay?.amount)||0;
    collectedAmt+=amt;
    if(item==="임대료"||item==="관리비"){
      const exp=item==="임대료"?Number(t.rent)||0:Number(t.managementFee)||0;
      totalExpected+=exp;
    }
    if(st.label==="수납완료") completedCnt++;
    else if(st.label==="부분수납"||st.label==="초과수납") partialCnt++;
    else unpaidCnt++;
  }

  const SC=(label,value,color)=>(
    <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"12px 16px",flex:1}}>
      <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:4}}>{label}</div>
      <div style={{fontSize:18,fontWeight:500,color}}>{value}</div>
    </div>
  );

  const amtS={width:"100%",fontSize:12,padding:"4px 8px",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",textAlign:"right",background:"var(--color-background-primary)",color:"var(--color-text-primary)",boxSizing:"border-box"};
  const isLoading=impState.status==="loading";

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontWeight:500,fontSize:14,color:"var(--color-text-primary)"}}>{monthLbl(month)} {isRent?"임/관비":"공과금"} 수납 현황</span>
        <input type="month" value={month} onChange={e=>{setMonth(e.target.value);setShowResetConfirm(false);}} style={{fontSize:13,padding:"5px 10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}/>
        <select value={filterBldId} onChange={e=>setFilterBldId(e.target.value)} style={{fontSize:13,padding:"5px 10px",border:`0.5px solid ${filterBldId?"#378add":"var(--color-border-secondary)"}`,borderRadius:"var(--border-radius-md)",background:filterBldId?"#eef5fb":"var(--color-background-primary)",color:filterBldId?"#0c447c":"var(--color-text-secondary)",cursor:"pointer"}}>
          <option value="">전체 건물</option>
          {(buildings||[]).map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
        </select>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {showResetConfirm&&<span style={{fontSize:12,color:"#a32d2d",fontWeight:500}}>{filterBldId?`[${getBld(filterBldId)}] 수납내역만 초기화하시겠습니까?`:"[전체 건물] 수납내역을 초기화하시겠습니까?"}</span>}
          <button
            onClick={handleReset}
            style={{fontSize:12,padding:"6px 14px",border:`0.5px solid ${showResetConfirm?"#a32d2d":"var(--color-border-secondary)"}`,borderRadius:"var(--border-radius-md)",background:showResetConfirm?"#a32d2d":"var(--color-background-primary)",color:showResetConfirm?"#fff":"#a32d2d",cursor:"pointer",fontWeight:500,whiteSpace:"nowrap"}}>
            {showResetConfirm?"⚠️ 확인 (초기화)":`🗑 ${filterBldId?getBld(filterBldId)+" ":""}수납내역 초기화`}
          </button>
          {showResetConfirm&&<button onClick={()=>setShowResetConfirm(false)} style={{fontSize:12,padding:"6px 10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"var(--color-background-primary)",color:"var(--color-text-secondary)",cursor:"pointer"}}>취소</button>}
        </div>
      </div>

      {/* 전자계산서 일괄 수납 */}
      <Card style={{padding:"16px 18px",background:"#f8fbff"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontWeight:500,fontSize:13,color:"#1e3a5f",marginBottom:4}}>📋 전자(세금)계산서 일괄 수납</div>
            <div style={{fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.6}}>홈택스 엑셀 업로드 양식(.xls) — 세금계산서·전자계산서 모두 지원<br/>Ctrl/Cmd+클릭으로 여러 파일 동시 선택 가능<br/>{filterBldId&&<span style={{color:"#0c447c",fontWeight:500}}>📌 현재 [{getBld(filterBldId)}] 임차인만 표시 중 — 파일 수납도 이 건물 임차인 기준으로 처리됩니다</span>}</div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={downloadTemplate} style={{fontSize:12,padding:"7px 14px",border:"0.5px solid #9fe1cb",borderRadius:"var(--border-radius-md)",background:"#e1f5ee",color:"#0f6e56",cursor:"pointer",whiteSpace:"nowrap"}}>📥 양식</button>
            <button onClick={()=>fileRef.current?.click()} disabled={isLoading} style={{fontSize:13,padding:"8px 18px",border:"none",borderRadius:"var(--border-radius-md)",background:isLoading?"#888":"#1e3a5f",color:"#fff",cursor:isLoading?"not-allowed":"pointer",fontWeight:500,whiteSpace:"nowrap"}}>
              {isLoading?`⏳ ${impState.step||"처리 중..."}` : "📂 파일 선택 후 수납 처리"}
            </button>
            <input ref={fileRef} type="file" accept=".xls,.xlsx" multiple style={{display:"none"}} onChange={e=>{if(e.target.files.length)importFiles(e.target.files,filterBldId||null); e.target.value="";}}/>
          </div>
        </div>
        {impState.status==="done"&&impState.log&&(
          <div style={{marginTop:12,padding:"12px 14px",background:impState.log.unmatched?.length>0?"#faeeda":"#eaf3de",borderRadius:"var(--border-radius-md)",fontSize:12}}>
            <div style={{fontWeight:500,color:impState.log.unmatched?.length>0?"#854f0b":"#3b6d11",marginBottom:6}}>✓ {impState.log.files}개 파일 처리 완료 — {impState.log.matched}건 수납 기록{impState.log.filterBldId?` (${getBld(impState.log.filterBldId)} 건물 한정)`:""}</div>
            {impState.log.details?.length>0&&<div style={{color:"#3b6d11",marginBottom:4,fontSize:11,lineHeight:1.8}}>{impState.log.details.map((d,i)=><span key={i} style={{display:"inline-block",marginRight:12}}>• {d}</span>)}</div>}
            {impState.log.unmatched?.length>0&&<div style={{color:"#854f0b",marginTop:4}}>⚠️ 미등록 임차인(매칭 실패): {impState.log.unmatched.join(" / ")}</div>}
            {impState.log.unknownItems?.length>0&&<div style={{color:"#6b4c9a",marginTop:4}}>⚠️ 인식 안 된 품목(수납 미처리): {impState.log.unknownItems.map(u=>`${u.tenant} - ${u.raw}(${u.amount.toLocaleString("ko-KR")}원)`).join(" / ")}</div>}
            <button onClick={()=>setImpState({status:"idle",log:null})} style={{marginTop:8,fontSize:11,color:"var(--color-text-secondary)",background:"none",border:"none",cursor:"pointer",padding:0}}>닫기</button>
          </div>
        )}
        {impState.status==="error"&&impState.log&&(
          <div style={{marginTop:12,padding:"10px 14px",background:"#fcebeb",borderRadius:"var(--border-radius-md)",fontSize:12,color:"#a32d2d"}}>
            ❌ {impState.log.message}
            <button onClick={()=>setImpState({status:"idle",log:null})} style={{marginLeft:12,fontSize:11,color:"#a32d2d",background:"none",border:"none",cursor:"pointer"}}>닫기</button>
          </div>
        )}
      </Card>

      {/* 통계 */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {SC("전체 납입 항목",`${totalCnt}건`,"var(--color-text-primary)")}
        {SC("수납완료",`${completedCnt}건`,"#3b6d11")}
        {SC("부분/초과수납",`${partialCnt}건`,"#854f0b")}
        {SC("미수납",`${unpaidCnt}건`,"#a32d2d")}
        {isRent&&SC("수납 금액",`${collectedAmt.toLocaleString("ko-KR")}원`,"#1e3a5f")}
      </div>

      {/* 수납 테이블 */}
      <Card><div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{background:"var(--color-background-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <th rowSpan={2} style={{padding:"10px 12px",textAlign:"left",color:"var(--color-text-secondary)",fontWeight:500,whiteSpace:"nowrap",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>건물</th>
              <th rowSpan={2} style={{padding:"10px 12px",textAlign:"center",color:"var(--color-text-secondary)",fontWeight:500,borderBottom:"0.5px solid var(--color-border-tertiary)"}}>층</th>
              <th rowSpan={2} style={{padding:"10px 12px",textAlign:"left",color:"var(--color-text-secondary)",fontWeight:500,whiteSpace:"nowrap",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>임차인</th>
              {allItems.map(item=><th key={item} colSpan={isRent?3:2} style={{padding:"10px 12px",textAlign:"center",color:"var(--color-text-primary)",fontWeight:500,whiteSpace:"nowrap",borderLeft:"0.5px solid var(--color-border-tertiary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>{item}</th>)}
            </tr>
            <tr style={{background:"var(--color-background-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              {allItems.flatMap(item=>{
                const isRM=item==="임대료"||item==="관리비";
                return [
                  isRM&&<th key={`${item}-exp`} style={{padding:"6px 8px",textAlign:"right",color:"var(--color-text-secondary)",fontWeight:400,fontSize:11,borderLeft:"0.5px solid var(--color-border-tertiary)",minWidth:95,whiteSpace:"nowrap"}}>등록금액</th>,
                  <th key={`${item}-amt`} style={{padding:"6px 8px",textAlign:"right",color:"var(--color-text-secondary)",fontWeight:400,fontSize:11,borderLeft:isRM?"none":"0.5px solid var(--color-border-tertiary)",minWidth:95,whiteSpace:"nowrap"}}>청구/수납금액</th>,
                  <th key={`${item}-st`} style={{padding:"6px 8px",textAlign:"center",color:"var(--color-text-secondary)",fontWeight:400,fontSize:11,minWidth:82}}>상태</th>
                ].filter(Boolean);
              })}
            </tr>
          </thead>
          <tbody>
            {sorted.length===0?<tr><td colSpan={3+allItems.length*(isRent?3:2)} style={{textAlign:"center",padding:"40px 0",color:"var(--color-text-secondary)"}}>임차인이 없습니다.</td></tr>
            :sorted.map(tenant=>(
              <tr key={tenant.id} style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                <td style={{padding:"8px 12px",whiteSpace:"nowrap",fontWeight:500,color:"var(--color-text-primary)"}}>{getBld(tenant.buildingId)}</td>
                <td style={{padding:"8px 12px",textAlign:"center",color:"var(--color-text-secondary)"}}>{tenant.floor}층</td>
                <td style={{padding:"8px 12px",whiteSpace:"nowrap",fontWeight:500,color:"var(--color-text-primary)"}}>{tenant.name}</td>
                {allItems.flatMap(item=>{
                  const isRM=item==="임대료"||item==="관리비";
                  if(!isApplicable(tenant,item)) return [
                    <td key={item} colSpan={isRent?3:2} style={{padding:"8px 12px",textAlign:"center",color:"var(--color-text-secondary)",fontSize:11,background:"var(--color-background-secondary)",borderLeft:"0.5px solid var(--color-border-tertiary)"}}>해당없음</td>
                  ];
                  const pay=payments[tenant.id]?.[item];
                  const st=getPayStatus(tenant,item,pay);
                  const expected=item==="임대료"?Number(tenant.rent)||0:item==="관리비"?Number(tenant.managementFee)||0:0;
                  return [
                    isRM&&<td key={`${item}-exp`} style={{padding:"6px 8px",textAlign:"right",whiteSpace:"nowrap",color:"var(--color-text-secondary)",fontSize:12,borderLeft:"0.5px solid var(--color-border-tertiary)"}}>
                      {fmtNum(expected)}
                    </td>,
                    <td key={`${item}-amt`} style={{padding:"6px 8px",borderLeft:isRM?"none":"0.5px solid var(--color-border-tertiary)"}}>
                      <NumberInput value={pay?.amount??""} onChange={v=>setAmount(tenant.id,item,v)} placeholder={String(expected||0)} style={amtS}/>
                    </td>,
                    <td key={`${item}-st`} style={{padding:"6px 8px",textAlign:"center"}}>
                      <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",gap:1}}>
                        <button onClick={()=>isRM?null:togglePaid(tenant.id,item)} style={{padding:"4px 8px",borderRadius:"var(--border-radius-md)",fontSize:11,fontWeight:500,cursor:isRM?"default":"pointer",border:"none",background:st.bg,color:st.color,minWidth:70,whiteSpace:"nowrap"}}>
                          {st.label}
                        </button>
                        {st.diff!==null&&<div style={{fontSize:10,color:st.color,marginTop:1}}>
                          {st.diff>0?`+${fmtNum(st.diff)}`:fmtNum(st.diff)}원
                        </div>}
                        {pay?.paidDate&&<div style={{fontSize:10,color:"var(--color-text-secondary)"}}>{pay.paidDate}</div>}
                      </div>
                    </td>
                  ].filter(Boolean);
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div></Card>
    </div>
  );
}

/* ── 대시보드 탭 ─────────────────────────────────────────────── */
function DashboardTab({buildings,tenants,payments,month,setMonth,getBld}) {
  const [selectedBld,setSelectedBld]=useState(null);
  const [lastClick,setLastClick]=useState({id:null,time:0});
  const ALL_ITEMS=["임대료","관리비",...UTILITY_ITEMS];

  const isApplicable=(tenant,item)=>{
    const sel=tenant.items||tenant.utilities||{};
    const hasPay=!!(payments[tenant.id]?.[item]?.amount);
    if(item==="임대료") return sel["임대료"]!==false;
    if(item==="관리비") return !!sel["관리비"]||hasPay;
    return !!sel[item]||hasPay;
  };

  // 건물별 통계 계산
  const bldStats=buildings.map(b=>{
    const bTenants=tenants.filter(t=>t.buildingId===b.id);
    let totalRent=0,collectedRent=0,totalMgmt=0,collectedMgmt=0;
    let utilTotal=0,utilDone=0,utilCollected=0;
    for(const t of bTenants){
      const rp=payments[t.id]?.["임대료"];
      const mp=payments[t.id]?.["관리비"];
      if(isApplicable(t,"임대료")){
        totalRent+=Number(t.rent)||0;
        collectedRent+=Number(rp?.amount)||0;
      }
      if(isApplicable(t,"관리비")){
        totalMgmt+=Number(t.managementFee)||0;
        collectedMgmt+=Number(mp?.amount)||0;
      }
      for(const item of UTILITY_ITEMS){
        if(!isApplicable(t,item)) continue;
        utilTotal++;
        const up=payments[t.id]?.[item];
        if(up?.paid){ utilDone++; utilCollected+=Number(up.amount)||0; }
      }
    }
    const rentRate=totalRent>0?Math.round(collectedRent/totalRent*100):0;
    const mgmtRate=totalMgmt>0?Math.round(collectedMgmt/totalMgmt*100):0;
    const utilRate=utilTotal>0?Math.round(utilDone/utilTotal*100):0;
    return {b,bTenants,totalRent,collectedRent,rentRate,totalMgmt,collectedMgmt,mgmtRate,utilTotal,utilDone,utilRate,utilCollected};
  });

  // 전체 합계
  const totals=bldStats.reduce((acc,s)=>({
    totalRent:acc.totalRent+s.totalRent, collectedRent:acc.collectedRent+s.collectedRent,
    totalMgmt:acc.totalMgmt+s.totalMgmt, collectedMgmt:acc.collectedMgmt+s.collectedMgmt,
    utilTotal:acc.utilTotal+s.utilTotal, utilDone:acc.utilDone+s.utilDone, utilCollected:acc.utilCollected+s.utilCollected,
  }),{totalRent:0,collectedRent:0,totalMgmt:0,collectedMgmt:0,utilTotal:0,utilDone:0,utilCollected:0});
  const totalRentRate=totals.totalRent>0?Math.round(totals.collectedRent/totals.totalRent*100):0;
  const totalMgmtRate=totals.totalMgmt>0?Math.round(totals.collectedMgmt/totals.totalMgmt*100):0;

  // 건물 클릭 — 더블클릭 감지
  const handleBldClick=(id)=>{
    const now=Date.now();
    if(lastClick.id===id&&now-lastClick.time<500){
      setSelectedBld(prev=>prev===id?null:id);
    }
    setLastClick({id,time:now});
  };

  const selBldData=selectedBld?bldStats.find(s=>s.b.id===selectedBld):null;
  const RateBar=({rate,color})=>(
    <div style={{height:6,borderRadius:3,background:"#e8edf2",overflow:"hidden",marginTop:6}}>
      <div style={{height:"100%",width:`${rate}%`,background:color||"#3b6d11",borderRadius:3,transition:"width 0.4s"}}/>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* 월 선택 */}
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontWeight:500,fontSize:14,color:"var(--color-text-primary)"}}>📊 {monthLbl(month)} 수납 현황</span>
        <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{fontSize:13,padding:"5px 10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}/>
        <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>건물 카드를 더블클릭하면 상세 수납현황이 표시됩니다</span>
      </div>

      {/* 전체 요약 */}
      {(()=>{
        const SumCard=({label,total,collected,rate,unit="원"})=>{
          const rc=rate===100?"#3b6d11":rate>=80?"#854f0b":"#a32d2d";
          return (
            <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"12px 16px",flex:1,minWidth:150}}>
              <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:6}}>{label}</div>
              <div style={{fontSize:15,fontWeight:600,color:"#1e3a5f",marginBottom:2}}>{collected.toLocaleString("ko-KR")}{unit}</div>
              <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:4}}>청구 {total.toLocaleString("ko-KR")}{unit}</div>
              <div style={{height:5,borderRadius:3,background:"#e8edf2",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(rate,100)}%`,background:rc,borderRadius:3}}/>
              </div>
              <div style={{fontSize:11,color:rc,fontWeight:500,marginTop:3}}>{rate}% 수납</div>
            </div>
          );
        };
        return (
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"12px 16px",minWidth:110}}>
              <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:4}}>전체 임차인</div>
              <div style={{fontSize:18,fontWeight:600,color:"var(--color-text-primary)"}}>{tenants.length}명</div>
            </div>
            <SumCard label="임대료" total={totals.totalRent} collected={totals.collectedRent} rate={totalRentRate}/>
            <SumCard label="관리비" total={totals.totalMgmt} collected={totals.collectedMgmt} rate={totalMgmtRate}/>
            <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"12px 16px",flex:1,minWidth:130}}>
              <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:6}}>공과금</div>
              <div style={{fontSize:15,fontWeight:600,color:"#1e3a5f",marginBottom:2}}>{totals.utilDone}<span style={{fontSize:11,fontWeight:400,color:"var(--color-text-secondary)"}}>/{totals.utilTotal}건</span></div>
              <div style={{fontSize:12,color:"#3b6d11",fontWeight:500,marginBottom:4}}>{totals.utilCollected.toLocaleString("ko-KR")}원 수납</div>
              <div style={{height:5,borderRadius:3,background:"#e8edf2",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${totals.utilTotal>0?Math.round(totals.utilDone/totals.utilTotal*100):0}%`,background:totals.utilDone===totals.utilTotal?"#3b6d11":"#854f0b",borderRadius:3}}/>
              </div>
              <div style={{fontSize:11,color:totals.utilDone===totals.utilTotal?"#3b6d11":"#854f0b",fontWeight:500,marginTop:3}}>{totals.utilTotal>0?Math.round(totals.utilDone/totals.utilTotal*100):0}% 수납완료</div>
            </div>
          </div>
        );
      })()}

      {/* 건물별 카드 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
        {bldStats.map(({b,bTenants,totalRent,collectedRent,rentRate,totalMgmt,collectedMgmt,mgmtRate,utilTotal,utilDone,utilRate,utilCollected})=>{
          const isSel=selectedBld===b.id;
          return (
            <div key={b.id}
              onDoubleClick={()=>setSelectedBld(prev=>prev===b.id?null:b.id)}
              onClick={()=>handleBldClick(b.id)}
              style={{background:isSel?"#eef5ff":"var(--color-background-primary)",border:`1.5px solid ${isSel?"#378add":"var(--color-border-tertiary)"}`,borderRadius:"var(--border-radius-lg)",padding:"16px 18px",cursor:"pointer",userSelect:"none",transition:"border-color 0.2s,background 0.2s"}}>
              {/* 카드 헤더 */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <span style={{fontWeight:600,fontSize:15,color:"#1e3a5f"}}>🏢 {b.name}</span>
                <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{bTenants.length}명</span>
              </div>
              {/* 임대료 */}
              {(()=>{const rc=rentRate===100?"#3b6d11":rentRate>=80?"#854f0b":"#a32d2d"; return(
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                    <span style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}}>임대료</span>
                    <span style={{fontSize:11,color:rc,fontWeight:600}}>{rentRate}%</span>
                  </div>
                  <div style={{height:6,borderRadius:3,background:"#e8edf2",overflow:"hidden",marginBottom:3}}>
                    <div style={{height:"100%",width:`${Math.min(rentRate,100)}%`,background:rc,borderRadius:3,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                    <span style={{color:rc,fontWeight:500}}>{collectedRent.toLocaleString("ko-KR")}원</span>
                    <span style={{color:"var(--color-text-secondary)"}}>/ {totalRent.toLocaleString("ko-KR")}원</span>
                  </div>
                </div>
              );})()}
              {/* 관리비 */}
              {(()=>{const mc=mgmtRate===100?"#3b6d11":mgmtRate>=80?"#854f0b":"#a32d2d"; return(
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                    <span style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}}>관리비</span>
                    <span style={{fontSize:11,color:mc,fontWeight:600}}>{mgmtRate}%</span>
                  </div>
                  <div style={{height:6,borderRadius:3,background:"#e8edf2",overflow:"hidden",marginBottom:3}}>
                    <div style={{height:"100%",width:`${Math.min(mgmtRate,100)}%`,background:mc,borderRadius:3,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                    <span style={{color:mc,fontWeight:500}}>{collectedMgmt.toLocaleString("ko-KR")}원</span>
                    <span style={{color:"var(--color-text-secondary)"}}>/ {totalMgmt.toLocaleString("ko-KR")}원</span>
                  </div>
                </div>
              );})()}
              {/* 공과금 */}
              {(()=>{const uc=utilRate===100?"#3b6d11":utilRate>=80?"#854f0b":"#a32d2d"; return utilTotal>0?(
                <div style={{paddingTop:8,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                    <span style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}}>공과금</span>
                    <span style={{fontSize:11,color:uc,fontWeight:600}}>{utilDone}/{utilTotal}건</span>
                  </div>
                  <div style={{height:4,borderRadius:3,background:"#e8edf2",overflow:"hidden",marginBottom:3}}>
                    <div style={{height:"100%",width:`${utilRate}%`,background:uc,borderRadius:3,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{fontSize:11,color:uc,fontWeight:500}}>{utilCollected.toLocaleString("ko-KR")}원 수납</div>
                </div>
              ):null;})()}
              {isSel&&<div style={{marginTop:10,fontSize:11,color:"#378add",textAlign:"center"}}>▼ 상세 보기 중</div>}
            </div>
          );
        })}
      </div>

      {/* 건물 상세 수납현황 */}
      {selBldData&&(
        <Card>
          <div style={{padding:"14px 18px",borderBottom:"0.5px solid var(--color-border-tertiary)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontWeight:500,fontSize:14,color:"#1e3a5f"}}>🏢 {selBldData.b.name} — {monthLbl(month)} 상세 수납현황</span>
            <button onClick={()=>setSelectedBld(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--color-text-secondary)"}}>×</button>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"var(--color-background-secondary)"}}>
                  <th style={{padding:"8px 12px",textAlign:"left",color:"var(--color-text-secondary)",fontWeight:500,borderBottom:"0.5px solid var(--color-border-tertiary)",whiteSpace:"nowrap"}}>층</th>
                  <th style={{padding:"8px 12px",textAlign:"left",color:"var(--color-text-secondary)",fontWeight:500,borderBottom:"0.5px solid var(--color-border-tertiary)",whiteSpace:"nowrap"}}>임차인</th>
                  {ALL_ITEMS.map(item=><th key={item} style={{padding:"8px 10px",textAlign:"center",color:"var(--color-text-secondary)",fontWeight:500,borderBottom:"0.5px solid var(--color-border-tertiary)",borderLeft:"0.5px solid var(--color-border-tertiary)",whiteSpace:"nowrap"}}>{item}</th>)}
                </tr>
              </thead>
              <tbody>
                {selBldData.bTenants.sort((a,b)=>(Number(a.floor)||0)-(Number(b.floor)||0)).map(t=>(
                  <tr key={t.id} style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                    <td style={{padding:"8px 12px",color:"var(--color-text-secondary)",textAlign:"center"}}>{t.floor}층</td>
                    <td style={{padding:"8px 12px",fontWeight:500,color:"var(--color-text-primary)",whiteSpace:"nowrap"}}>{t.name}</td>
                    {ALL_ITEMS.map(item=>{
                      if(!isApplicable(t,item)) return <td key={item} style={{padding:"8px 10px",textAlign:"center",borderLeft:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",fontSize:11}}>—</td>;
                      const pay=payments[t.id]?.[item];
                      const st=getPayStatus(t,item,pay);
                      const amt=Number(pay?.amount)||0;
                      return (
                        <td key={item} style={{padding:"6px 10px",textAlign:"center",borderLeft:"0.5px solid var(--color-border-tertiary)"}}>
                          <div style={{display:"inline-block",padding:"3px 8px",borderRadius:10,background:st.bg,color:st.color,fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{st.label}</div>
                          {amt>0&&<div style={{fontSize:10,color:"var(--color-text-secondary)",marginTop:2}}>{amt.toLocaleString("ko-KR")}원</div>}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}
    </div>
  );
}

    // 앱 렌더링
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
